<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo.png">
<title>SOSLAB 주간 업무 회의록</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

[data-theme="light"] {
  --bg: #f4f3ef;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: #e2dfd8;
  --border-strong: #c8c4ba;
  --text: #1c1a17;
  --text-muted: #6b6860;
  --text-faint: #aaa89f;
  --accent: #2563eb;
  --accent-light: #eff4ff;
  --green: #16a34a;
  --amber: #d97706;
  --red: #dc2626;
  --shadow: rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg: #1a1917;
  --surface: #242220;
  --surface2: #2c2a27;
  --border: #3a3835;
  --border-strong: #4a4845;
  --text: #f0ede8;
  --text-muted: #a09d98;
  --text-faint: #6b6860;
  --accent: #4f86f7;
  --accent-light: #1e2a45;
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #f87171;
  --shadow: rgba(0,0,0,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; transition: background 0.2s, color 0.2s; }

/* TOPBAR */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-title { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
.view-toggle { display: flex; border: 1px solid var(--border-strong); border-radius: var(--radius); overflow: hidden; }
.view-btn {
  padding: 5px 14px; font-size: 12px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
  border: none; background: var(--surface); color: var(--text-muted); transition: all 0.13s;
}
.view-btn.active { background: var(--text); color: var(--bg); }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: var(--radius);
  font-size: 12px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; border: 1px solid var(--border-strong);
  background: var(--surface); color: var(--text); transition: background 0.13s;
}
.btn:hover { background: var(--bg); }
.btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-save:hover { opacity: 0.88; }
.btn-print { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-print:hover { opacity: 0.88; }
.theme-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border-strong); background: var(--surface2);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background 0.13s;
}
.theme-btn:hover { background: var(--border); }
.save-indicator { font-size: 11px; color: var(--text-faint); display: flex; align-items: center; gap: 5px; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.save-dot.unsaved { background: var(--amber); }
.save-dot.saving { background: var(--accent); }

/* WEEK BAR */
.week-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.week-bar-label { font-size: 11px; color: var(--text-faint); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-right: 4px; }
.week-sel {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif; color: var(--text);
  background: var(--surface); outline: none; cursor: pointer;
}
.week-sel:focus { border-color: var(--accent); }
.week-period-badge {
  padding: 4px 10px; background: var(--accent-light); border-radius: 20px;
  font-size: 11px; color: var(--accent); font-weight: 500;
}

/* MEMBER TABS */
.member-tabs {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; overflow-x: auto;
}
.tab {
  padding: 11px 18px; font-size: 13px; font-weight: 400;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap;
  transition: all 0.13s; font-family: 'Noto Sans KR', sans-serif;
  background: none; border-top: none; border-left: none; border-right: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

/* MAIN */
.main { max-width: 900px; margin: 0 auto; padding: 32px 16px 80px; }

/* SECTION */
.section { margin-bottom: 28px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 2px; }
.section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }

/* TABLES */
.tbl { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tbl-head { background: var(--surface2); border-bottom: 1px solid var(--border); display: grid; }
.th { padding: 8px 10px; font-size: 10px; font-weight: 700; color: var(--text-faint); letter-spacing: 0.05em; text-transform: uppercase; }
.tbl-row { display: grid; border-bottom: 1px solid var(--border); align-items: stretch; }
.tbl-row:last-child { border-bottom: none; }
.tc { padding: 6px 10px; display: flex; align-items: flex-start; }
.tc input, .tc textarea, .tc select {
  width: 100%; border: none; background: transparent;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text); outline: none; resize: none;
}
.tc textarea { line-height: 1.5; min-height: 32px; overflow: hidden; }
.tc-center { align-items: center; }

/* task cols: 분류/업무명/진행률/세부현황이슈 */
.task-cols { grid-template-columns: 82px 200px 64px 1fr 32px; }
/* plan cols: 분류/업무명/세부내용/예상소요/완료목표 */
.plan-cols { grid-template-columns: 82px 200px 1fr 64px 90px 32px; }

.cat-sel {
  padding: 3px 6px; border-radius: 20px; border: 1px solid var(--border);
  font-size: 11px; font-family: 'Noto Sans KR', sans-serif;
  width: 100%; cursor: pointer; outline: none; background: var(--surface2); color: var(--text);
}
.pct-wrap { display: flex; align-items: center; gap: 1px; }
.pct-input {
  width: 36px !important; text-align: right; font-weight: 500;
  color: var(--accent) !important; font-size: 13px !important; padding: 0 !important;
}
.pct-sym { font-size: 12px; color: var(--accent); flex-shrink: 0; }
.del-btn { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 15px; padding: 4px 6px; line-height: 1; transition: color 0.13s; flex-shrink: 0; }
.del-btn:hover { color: var(--red); }
.add-row-btn {
  width: 100%; padding: 9px; background: none; border: none;
  border-top: 1px solid var(--border); color: var(--text-faint);
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; text-align: center; transition: background 0.12s;
}
.add-row-btn:hover { background: var(--surface2); color: var(--accent); }

/* MEMO */
.memo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.memo-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.memo-header {
  padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text-muted); background: var(--surface2);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px;
}
.dot-ind { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.memo-panel textarea {
  width: 100%; padding: 10px 12px; border: none; background: transparent;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text);
  resize: none; outline: none; min-height: 80px; line-height: 1.6; overflow: hidden;
}
.memo-full { grid-column: 1 / -1; }

/* SUBMIT VIEW */
#submitView { display: none; }
.submit-main { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }
.submit-section { margin-bottom: 24px; }

/* reporter row */
.reporter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.reporter-row label { font-size: 11px; color: var(--text-faint); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
.reporter-row input {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif; color: var(--text);
  background: var(--surface); outline: none; width: 160px;
}
.reporter-row input:focus { border-color: var(--accent); }

/* ATT */
.att-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.att-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.att-panel-head { display: grid; grid-template-columns: 72px 70px 80px 1fr; gap: 6px; padding: 7px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.att-col-label { font-size: 10px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; }
.att-member-row { display: grid; grid-template-columns: 72px 70px 80px 1fr; gap: 6px; padding: 7px 12px; border-bottom: 1px solid var(--border); align-items: center; }
.att-member-row:last-child { border-bottom: none; }
.att-name { font-size: 12px; font-weight: 500; }
.att-inp {
  padding: 4px 7px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif; color: var(--text);
  background: var(--surface); outline: none; width: 100%;
}
.att-inp:focus { border-color: var(--accent); }
.att-inp.readonly { background: var(--surface2); color: var(--text-muted); cursor: default; }

/* chart - border-based for print compatibility */
.chart-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.chart-title { font-size: 10px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.chart-bar-row { display: grid; grid-template-columns: 60px 1fr 42px 56px; gap: 8px; align-items: center; margin-bottom: 9px; }
.chart-bar-row:last-child { margin-bottom: 0; }
.chart-name { font-size: 12px; font-weight: 500; }
.chart-track { position: relative; height: 10px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.chart-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  border-right: 10px solid transparent; /* fallback */
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
}
.chart-val { font-size: 11px; font-weight: 500; text-align: right; }
.chart-total { font-size: 10px; color: var(--text-faint); text-align: right; }

/* summary editable table */
.summary-tbl { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; border-collapse: collapse; table-layout: fixed; }
.summary-tbl th { background: var(--surface2); padding: 8px 12px; font-size: 10px; font-weight: 700; color: var(--text-faint); letter-spacing: 0.06em; text-align: left; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.summary-tbl th:last-child { border-right: none; }
.summary-tbl td { padding: 0; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: top; overflow: hidden; }
.summary-tbl tr:last-child td { border-bottom: none; }
.summary-tbl td:last-child { border-right: none; }
.summary-tbl td.name-cell { padding: 10px 12px; font-size: 12px; font-weight: 500; white-space: nowrap; vertical-align: middle; width: 72px; }
.summary-tbl td textarea {
  width: 100%; padding: 8px 12px; border: none; background: transparent;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text);
  resize: none; outline: none; min-height: 48px; line-height: 1.6; overflow: hidden;
  display: block;
}
.summary-tbl td textarea:focus { background: var(--accent-light); }

/* meeting notes */
.meeting-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.meeting-field label { display: block; font-size: 10px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.meeting-field textarea {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text);
  background: var(--surface2); outline: none; resize: none; min-height: 70px; line-height: 1.6; overflow: hidden;
}
.meeting-field textarea:focus { border-color: var(--accent); background: var(--surface); }
.meeting-full { grid-column: 1 / -1; }

/* LOADING */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; font-size: 14px; color: var(--text-muted);
}
[data-theme="dark"] .loading-overlay { background: rgba(26,25,23,0.88); }

/* PRINT */
@media print {
  @page { size: A4 portrait; margin: 14mm 12mm; }
  body { background: white !important; color: #1c1a17 !important; font-size: 11px; }
  .topbar, .member-tabs, .week-bar, #writeView, .no-print { display: none !important; }
  #submitView { display: block !important; }
  .submit-main { padding: 0; max-width: 100%; }
  .print-header { display: block !important; }
  .att-inp { border: none !important; background: transparent !important; padding: 2px 0 !important; }
  .submit-section { break-inside: avoid; }
  .att-layout { break-inside: avoid; }
  .summary-tbl { table-layout: fixed !important; }
  .summary-tbl td { overflow: visible !important; vertical-align: top !important; }
  * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
}
.print-header {
  display: none; margin-bottom: 18px; padding-bottom: 12px;
  border-bottom: 2px solid #1c1a17;
}
.print-header h1 { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 6px; letter-spacing: 0.04em; }
.ph-sub { display: flex; justify-content: center; gap: 24px; font-size: 11px; color: #555; }

/* BAR COLORS */
.bar-c0 { background: #2563eb; }
.bar-c1 { background: #7c3aed; }
.bar-c2 { background: #16a34a; }
.bar-c3 { background: #d97706; }
.bar-c4 { background: #be185d; }
</style>
</head>
<body>

<!-- MEMBER MANAGEMENT MODAL -->
<div id="memberModal" style="display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.4); align-items:center; justify-content:center;">
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.15);">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <div style="font-size:14px; font-weight:700;">멤버 관리</div>
      <button onclick="closeMemberModal()" style="background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-faint); line-height:1;">×</button>
    </div>
    <div id="memberList" style="display:flex; flex-direction:column; gap:6px; margin-bottom:16px;"></div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="newMemberInput" placeholder="새 멤버 이름" style="flex:1; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:12px; font-family:'Noto Sans KR',sans-serif; color:var(--text); background:var(--surface); outline:none;">
      <button class="btn btn-save" onclick="addMemberFromModal()" style="padding:7px 12px; font-size:12px;">추가</button>
    </div>
    <div style="margin-top:12px; padding:10px; background:var(--surface2); border-radius:var(--radius); border:1px solid var(--border);">
      <div style="font-size:10px; color:var(--red); font-weight:700; margin-bottom:4px;">⚠ 삭제 주의</div>
      <div style="font-size:11px; color:var(--text-muted); line-height:1.5;">멤버 삭제 시 해당 멤버의 모든 작성 데이터가 함께 삭제됩니다. 되돌릴 수 없어요.</div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">데이터 불러오는 중...</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">
      <img src="logo.png" style="width:28px; height:28px; object-fit:contain; vertical-align:middle; margin-right:8px; border-radius:4px;">SOSLAB 주간 회의록
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnWrite" onclick="switchView('write')">작성</button>
      <button class="view-btn" id="btnSubmit" onclick="switchView('submit')">제출용</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="save-indicator">
      <div class="save-dot" id="saveDot"></div>
      <span id="saveLabel">저장됨</span>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="다크/라이트 모드">🌙</button>
    <button class="btn no-print" onclick="openMemberModal()" style="font-size:12px;">👥 멤버 관리</button>
    <button class="btn btn-save no-print" id="saveBtn" onclick="saveCurrentMember(true)">💾 내 정보 저장</button>
    <button class="btn btn-print no-print" onclick="doPrint()">🖨 PDF 출력</button>
  </div>
</div>

<!-- WEEK BAR -->
<div class="week-bar">
  <span class="week-bar-label">주차</span>
  <select class="week-sel" id="selYear" onchange="onWeekSelChange()"></select>
  <select class="week-sel" id="selMonth" onchange="onWeekSelChange()"></select>
  <select class="week-sel" id="selWeek" onchange="onWeekSelChange()"></select>
  <div class="week-period-badge" id="periodBadge">–</div>
</div>

<!-- WRITE VIEW -->
<div id="writeView">
  <div class="member-tabs" id="memberTabs"></div>
  <div class="main">

    <!-- TASK -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">지난주 업무</div>
        <button class="btn no-print" onclick="addTaskRow()" style="font-size:11px;padding:5px 10px;">+ 추가</button>
      </div>
      <div class="tbl">
        <div class="tbl-head task-cols">
          <div class="th">분류</div>
          <div class="th">업무명</div>
          <div class="th">진행률</div>
          <div class="th">세부 현황 / 이슈</div>
          <div class="th"></div>
        </div>
        <div id="taskBody"></div>
        <button class="add-row-btn no-print" onclick="addTaskRow()">+ 업무 추가</button>
      </div>
    </div>

    <!-- PLAN -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">이번주 계획</div>
        <button class="btn no-print" onclick="addPlanRow()" style="font-size:11px;padding:5px 10px;">+ 추가</button>
      </div>
      <div class="tbl">
        <div class="tbl-head plan-cols">
          <div class="th">분류</div>
          <div class="th">업무명</div>
          <div class="th">세부 내용</div>
          <div class="th">예상 시간</div>
          <div class="th">목표일</div>
          <div class="th"></div>
        </div>
        <div id="planBody"></div>
        <button class="add-row-btn no-print" onclick="addPlanRow()">+ 계획 추가</button>
      </div>
    </div>

    <!-- MEMO -->
    <div class="section">
      <div class="section-title" style="margin-bottom:8px;">기타</div>
      <div class="memo-grid">
        <div class="memo-panel">
          <div class="memo-header"><div class="dot-ind" style="background:#dc2626;"></div>막히는 것 / 도움 필요</div>
          <textarea id="memo_help" placeholder="어려운 점, 도움 요청..." oninput="markUnsaved(); autoResize(this);"></textarea>
        </div>
        <div class="memo-panel">
          <div class="memo-header"><div class="dot-ind" style="background:#d97706;"></div>교수님 확인 필요</div>
          <textarea id="memo_confirm" placeholder="미팅 일정, 방향 결정 필요 사항..." oninput="markUnsaved(); autoResize(this);"></textarea>
        </div>
        <div class="memo-panel memo-full">
          <div class="memo-header"><div class="dot-ind" style="background:#6b6860;"></div>기타 메모</div>
          <textarea id="memo_etc" placeholder="자유롭게 작성..." oninput="markUnsaved(); autoResize(this);"></textarea>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- SUBMIT VIEW -->
<div id="submitView">
  <div class="submit-main">

    <!-- PRINT HEADER -->
    <div class="print-header" id="printHeader">
      <h1 id="printTitle">SOSLAB 주간 업무 회의록</h1>
      <div class="ph-sub">
        <span id="ph_period"></span>
        <span id="ph_reporter"></span>
      </div>
    </div>

/* ── WEEK UTILS (Monday-based) ── */
function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function buildWeeksForYear(year) {
  const weeks = [];
  // Start from Jan 1, find first Monday of the year
  let monday = new Date(year, 0, 1);
  while (monday.getDay() !== 1) monday.setDate(monday.getDate() + 1);

  while (monday.getFullYear() === year) {
    const sunday = new Date(monday);
    sunday.setDate(sunday.getDate() + 6);

    // Month = monday's month (first Monday of April = April 1주)
    const m = monday.getMonth(); // 0-indexed

    // weekOfMonth = how many Mondays in this month have occurred up to and including this one
    let weekOfMonth = 1;
    let probe = new Date(monday);
    probe.setDate(probe.getDate() - 7);
    while (probe.getMonth() === m && probe.getFullYear() === year) {
      weekOfMonth++;
      probe.setDate(probe.getDate() - 7);
    }
    // weekOfMonth was counting backwards, fix: reset
    weekOfMonth = 1;
    probe = new Date(monday);
    probe.setDate(probe.getDate() - 7);
    while (probe.getMonth() === m && probe.getFullYear() === year) {
      weekOfMonth++;
      probe.setDate(probe.getDate() - 7);
    }
    // still wrong direction — count from first monday of month forward
    // find first monday of this month
    let firstMon = new Date(year, m, 1);
    while (firstMon.getDay() !== 1) firstMon.setDate(firstMon.getDate() + 1);
    weekOfMonth = Math.round((monday - firstMon) / (7 * 24 * 3600 * 1000)) + 1;

    const fmt = (d) => `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    weeks.push({
      year,
      month: m + 1,
      weekOfMonth,
      monday: new Date(monday),
      sunday: new Date(sunday),
      label: `${year}년 ${m+1}월 ${weekOfMonth}주`,
      period: `${fmt(monday)} ~ ${fmt(sunday)}`,
      key: `${year}-${String(m+1).padStart(2,'0')}-W${weekOfMonth}`,
    });

    monday.setDate(monday.getDate() + 7);
  }
  return weeks;
}

const YEARS = [2026, 2027, 2028, 2029, 2030];
const ALL_WEEKS = YEARS.flatMap(y => buildWeeksForYear(y));

function getTodayWeek() {
  const today = new Date();
  const todayMon = getMondayOfWeek(today);
  return ALL_WEEKS.find(w => w.monday.getTime() === todayMon.getTime()) || ALL_WEEKS[0];
}

/* ── WEEK SELECTORS ── */
function buildWeekSelectors() {
  const selYear = document.getElementById('selYear');
  const selMonth = document.getElementById('selMonth');
  const selWeek = document.getElementById('selWeek');

  const initYear = currentWeekInfo ? currentWeekInfo.year : YEARS[0];
  const initMonth = currentWeekInfo ? currentWeekInfo.month : 1;
  const initKey = currentWeekInfo ? currentWeekInfo.key : ALL_WEEKS[0].key;

  selYear.innerHTML = YEARS.map(y => `<option value="${y}" ${y===initYear?'selected':''}>${y}년</option>`).join('');

  function populateMonths(selectedMonth) {
    const yr = parseInt(selYear.value);
    const months = [...new Set(ALL_WEEKS.filter(w => w.year === yr).map(w => w.month))];
    selMonth.innerHTML = months.map(m => `<option value="${m}" ${m===selectedMonth?'selected':''}>${m}월</option>`).join('');
  }

  function populateWeeks(selectedKey) {
    const yr = parseInt(selYear.value);
    const m = parseInt(selMonth.value);
    const weeksInMonth = ALL_WEEKS.filter(w => w.year === yr && w.month === m);
    selWeek.innerHTML = weeksInMonth.map(w =>
      `<option value="${w.key}" ${w.key===selectedKey?'selected':''}>${w.weekOfMonth}주 (${w.period.split('~')[0].trim()}~)</option>`
    ).join('');
  }

  populateMonths(initMonth);
  populateWeeks(initKey);

  selYear.onchange = () => {
    populateMonths(1);
    populateWeeks(null);
    onWeekSelChange();
  };
  selMonth.onchange = () => {
    populateWeeks(null);
    onWeekSelChange();
  };
}

/* ── MONTH TOTAL COMPUTATION ── */
async function computeMonthTotals(currentMeetData) {
  // get all weeks in same month before current week
  const sameMonthPrevWeeks = ALL_WEEKS.filter(w =>
    w.year === currentWeekInfo.year &&
    w.month === currentWeekInfo.month &&
    w.key !== currentWeekInfo.key &&
    w.monday < currentWeekInfo.monday
  );

  const totals = {};
  members.forEach(m => totals[m] = 0);

  for (const w of sameMonthPrevWeeks) {
    const snap = await getDoc(doc(db, 'meetings', `meeting__${w.key}`));
    if (!snap.exists()) continue;
    const att = snap.data().att || {};
    members.forEach(m => {
      totals[m] += parseFloat(att[m]?.thisWeek || 0);
    });
  }

  // add current week's input
  members.forEach(m => {
    const thisWeek = parseFloat(currentMeetData?.att?.[m]?.thisWeek || 0);
    totals[m] += thisWeek;
  });

  return totals;
}

  members.forEach((m, i) => {
    const val = values[i];
    const pct = Math.round((val / maxVal) * 100);
    const color = BAR_COLORS[i % BAR_COLORS.length];
    const monthTotal = parseFloat(attData[m]?.monthTotal || 0);
    const row = document.createElement('div');
    row.className = 'chart-bar-row';
    // Use a table-based bar so background prints without special settings
    row.innerHTML = `
      <div class="chart-name">${m}</div>
      <div class="chart-track" style="background:#f0f0ee;">
        <div style="width:${pct}%; height:100%; background-color:${color}; print-color-adjust:exact; -webkit-print-color-adjust:exact;"></div>
      </div>
      <div class="chart-val" style="color:${color};">${val}h</div>
      <div class="chart-total">누계 ${monthTotal}h</div>
    `;
    container.appendChild(row);
  });
}

/* ── MEETING INPUT HANDLERS ── */
window.onAttInput = async function() {
  const att = collectAttData();
  const totals = await computeMonthTotals({ att });
  // update readonly total fields
  members.forEach(m => {
    const row = document.querySelector(`.att-member-row[data-member="${m}"]`);
    if (row) {
      row.querySelector('.att-total').value = totals[m];
      if (att[m]) att[m].monthTotal = totals[m];
    }
  });
  renderChart(att);
  scheduleMeetingSave();
};

window.onMeetingInput = function() {
  scheduleMeetingSave();
};

function scheduleMeetingSave() {
  clearTimeout(meetingSaveTimer);
  meetingSaveTimer = setTimeout(() => saveMeetingNow(false), 1500);
}

async function saveMeetingNow(showFeedback = false) {
  const att = collectAttData();
  const meetData = {
    att,
    reporter: document.getElementById('reporterInput').value,
    distribution: document.getElementById('meet_distribution').value,
    collab: document.getElementById('meet_collab').value,
    etc: document.getElementById('meet_etc').value,
    summaryData: collectSummaryData(),
    week: currentWeekInfo.key,
    period: currentWeekInfo.period,
  };
  await setDoc(doc(db, 'meetings', `meeting__${currentWeekInfo.key}`), meetData);
  if (showFeedback) {
    markSaved();
    const btn = document.getElementById('saveBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ 저장됨';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }
}

window.saveMeetingNow = saveMeetingNow;

/* ── SUMMARY (editable) ── */
function buildSummaryRows(savedSummary) {
  const tbody = document.getElementById('summaryBody');
  tbody.innerHTML = '';
  members.forEach(m => {
    const saved = savedSummary?.[m] || {};
    const tr = document.createElement('tr');
    tr.dataset.member = m;
    tr.innerHTML = `
      <td class="name-cell">${m}</td>
      <td><textarea oninput="onMeetingInput(); autoResize(this);" style="min-height:60px;">${esc(saved.lastWeek||'')}</textarea></td>
      <td><textarea oninput="onMeetingInput(); autoResize(this);" style="min-height:60px;">${esc(saved.thisWeek||'')}</textarea></td>
    `;
    tbody.appendChild(tr);
  });
  setTimeout(() => {
    document.querySelectorAll('#summaryBody textarea').forEach(ta => autoResize(ta));
  }, 80);
}

function collectSummaryData() {
  const result = {};
  document.querySelectorAll('#summaryBody tr').forEach(tr => {
    const m = tr.dataset.member;
    const tas = tr.querySelectorAll('textarea');
    result[m] = { lastWeek: tas[0]?.value||'', thisWeek: tas[1]?.value||'' };
  });
  return result;
}

/* ── RENDER SUBMIT VIEW ── */
async function renderSubmitView() {
  showLoading();

  const meetSnap = await getDoc(doc(db, 'meetings', `meeting__${currentWeekInfo.key}`));
  const meet = meetSnap.exists() ? meetSnap.data() : {};

  // reporter & fields
  document.getElementById('reporterInput').value = meet.reporter || '';
  document.getElementById('meet_distribution').value = meet.distribution || '';
  document.getElementById('meet_collab').value = meet.collab || '';
  document.getElementById('meet_etc').value = meet.etc || '';

  // att rows & chart
  const attData = meet.att || {};

  // compute month totals from DB
  const totals = await computeMonthTotals(meet);
  members.forEach(m => {
    if (attData[m]) attData[m].monthTotal = totals[m];
    else attData[m] = { thisWeek: 0, monthTotal: totals[m], note: '' };
  });

  renderAttRows(attData);
  renderChart(attData);

  // summary
  buildSummaryRows(meet.summaryData || {});

  // print header
  document.getElementById('printTitle').textContent = `SOSLAB 주간 업무 회의록 (${currentWeekInfo.label})`;
  document.getElementById('ph_period').textContent = currentWeekInfo.period;
  document.getElementById('ph_reporter').textContent = meet.reporter ? `보고자: ${meet.reporter}` : '';

  setTimeout(() => {
    document.querySelectorAll('#submitView textarea').forEach(ta => autoResize(ta));
  }, 120);

  hideLoading();
}

/* ── RESET SUBMIT ── */
window.resetSubmit = async function() {
  if (!confirm('제출용 페이지의 모든 내용을 초기화할까요?')) return;
  document.getElementById('reporterInput').value = '';
  document.getElementById('meet_distribution').value = '';
  document.getElementById('meet_collab').value = '';
  document.getElementById('meet_etc').value = '';
  document.querySelectorAll('.att-this').forEach(el => el.value = '');
  document.querySelectorAll('.att-total').forEach(el => el.value = '');
  document.querySelectorAll('.att-note').forEach(el => el.value = '');
  document.querySelectorAll('#summaryBody textarea').forEach(el => { el.value = ''; autoResize(el); });
  renderChart({});
  await setDoc(doc(db, 'meetings', `meeting__${currentWeekInfo.key}`), {
    att: {}, reporter: '', distribution: '', collab: '', etc: '', summaryData: {},
    week: currentWeekInfo.key, period: currentWeekInfo.period,
  });
};

/* ── PRINT ── */
window.doPrint = async function() {
  if (currentView === 'write') {
    await saveCurrentMember(false);
    await switchView('submit');
  }
  const reporter = document.getElementById('reporterInput').value;
  document.getElementById('printTitle').textContent = `SOSLAB 주간 업무 회의록 (${currentWeekInfo.label})`;
  document.getElementById('ph_period').textContent = currentWeekInfo.period;
  document.getElementById('ph_reporter').textContent = reporter ? `보고자: ${reporter}` : '';
  document.getElementById('printHeader').style.display = 'block';

  // Convert all textareas in submitView to divs for proper print rendering
  const submitEl = document.getElementById('submitView');
  const replacements = [];
  submitEl.querySelectorAll('textarea').forEach(ta => {
    const div = document.createElement('div');
    const inMeetingField = !!ta.closest('.meeting-field');
    div.style.whiteSpace = 'pre-wrap';
    div.style.wordBreak = 'break-word';
    div.style.wordWrap = 'break-word';
    div.style.padding = inMeetingField ? '2px 0' : '8px 12px';
    div.style.fontSize = '12px';
    div.style.lineHeight = '1.6';
    div.style.fontFamily = "'Noto Sans KR', sans-serif";
    div.style.width = '100%';
    div.style.boxSizing = 'border-box';
    div.textContent = ta.value;
    ta.parentNode.insertBefore(div, ta);
    ta.style.display = 'none';
    replacements.push({ ta, div });
  });

  window.print();

  // Restore textareas
  setTimeout(() => {
    replacements.forEach(({ ta, div }) => {
      ta.style.display = '';
      div.remove();
    });
    document.getElementById('printHeader').style.display = 'none';
  }, 600);
};

// Ctrl+S
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    currentView === 'write' ? saveCurrentMember(true) : saveMeetingNow(true);
  }
});
</script>
